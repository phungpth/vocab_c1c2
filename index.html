        // ================= LOGIC ĐIỀU KHIỂN =================
        let currentUnit = "02";
        let currentIndex = 0;
        let audioCache = { normal: {}, slow: {} };

        const audioPlayer = document.getElementById('eleven-audio');
        const unitSelectEl = document.getElementById('unit-select');
        const progressEl = document.getElementById('progress');
        const userInputEl = document.getElementById('user-input');
        const correctTextEl = document.getElementById('correct-text');
        const translationTextEl = document.getElementById('translation-text');
        const diffTextEl = document.getElementById('diff-text');
        const resultBoxEl = document.getElementById('result-box');

        const btnPlay = document.getElementById('btn-play');
        const btnPlaySlow = document.getElementById('btn-play-slow');
        const btnCheck = document.getElementById('btn-check');
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');

        // ================= TỐI ƯU 2: TỰ ĐỘNG TẠO OPTION CHO SELECT ===============
        function initUnitSelector() {
            let optionsHTML = "";
            for (let i = 2; i <= 26; i += 2) {
                // Định dạng số thành 2 chữ số (vd: 2 -> "02", 12 -> "12")
                const unitValue = String(i).padStart(2, '0');
                optionsHTML += `<option value="${unitValue}">Unit ${i}</option>`;
            }
            unitSelectEl.innerHTML = optionsHTML;
        }

        // Lấy danh sách câu hỏi an toàn (trả về mảng rỗng nếu chưa có data)
        function getCurrentSentences() {
            return allUnitsData[currentUnit] || [];
        }

        function updateSentence() {
            const currentSentences = getCurrentSentences();

            if (currentSentences.length === 0) {
                progressEl.innerText = `Câu: 0 / 0`;
                userInputEl.value = '';
                userInputEl.disabled = true;
                resultBoxEl.style.display = 'none';
                btnPlay.disabled = true;
                btnPlaySlow.disabled = true;
                btnCheck.disabled = true;
                btnPrev.disabled = true;
                btnNext.disabled = true;
                alert(`Dữ liệu của Unit ${parseInt(currentUnit)} hiện đang trống! Vui lòng chọn Unit khác.`);
                return;
            }

            userInputEl.disabled = false;
            btnCheck.disabled = false;
            progressEl.innerText = `Câu: ${currentIndex + 1} / ${currentSentences.length}`;
            userInputEl.value = '';
            resultBoxEl.style.display = 'none';

            btnPrev.disabled = currentIndex === 0;
            btnNext.disabled = currentIndex === currentSentences.length - 1;

            speakGoogleTTS(currentSentences[currentIndex].text, 'normal');
        }
        async function speakGoogleTTS(text, speedType) {
            audioPlayer.pause();

            if (audioCache[speedType][currentIndex]) {
                audioPlayer.src = audioCache[speedType][currentIndex];
                audioPlayer.play().catch(e => console.log("Audio interrupted"));
                return;
            }

            const targetButton = speedType === 'normal' ? btnPlay : btnPlaySlow;
            const originalText = targetButton.innerText;
            targetButton.disabled = true;
            targetButton.innerText = "⏳ Tải...";

            try {
                const encodedText = encodeURIComponent(text);
                const speedValue = speedType === 'normal' ? '1' : '0.45';
                const audioUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=en&client=tw-ob&q=${encodedText}&ttsspeed=${speedValue}`;

                audioCache[speedType][currentIndex] = audioUrl;
                audioPlayer.src = audioUrl;
                audioPlayer.play().catch(e => console.log("Audio interrupted"));

            } catch (error) {
                console.error(error);
            } finally {
                targetButton.disabled = false;
                targetButton.innerText = originalText;
            }
        }

        // ================= SỰ KIỆN LẮNG NGHE =================
        unitSelectEl.addEventListener('change', (e) => {
            currentUnit = e.target.value;
            currentIndex = 0;
            audioCache = { normal: {}, slow: {} }; // Reset cache của bài cũ
            updateSentence();
        });

        btnPlay.addEventListener('click', () => {
            const list = getCurrentSentences();
            if (list[currentIndex]) speakGoogleTTS(list[currentIndex].text, 'normal');
        });

        btnPlaySlow.addEventListener('click', () => {
            const list = getCurrentSentences();
            if (list[currentIndex]) speakGoogleTTS(list[currentIndex].text, 'slow');
        });

        btnCheck.addEventListener('click', () => {
            const list = getCurrentSentences();
            if (!list || list.length === 0) return;

            const currentData = list[currentIndex];
            const correctStr = currentData.text.trim();
            const userStr = userInputEl.value.trim();

            correctTextEl.innerHTML = currentData.html;
            translationTextEl.innerText = currentData.vi;
            diffTextEl.innerHTML = generateDiffHTML(correctStr, userStr);

            resultBoxEl.style.display = 'block';
        });

        function generateDiffHTML(correct, user) {
            const clean = str => str.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?]/g, "").toLowerCase().split(/\s+/);
            const correctWords = correct.split(/\s+/);
            const userWords = clean(user);

            return correctWords.map((word) => {
                const cleanWord = word.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?]/g, "").toLowerCase();
                return userWords.includes(cleanWord)
                    ? `<span class="correct-word">${word}</span>`
                    : `<span class="incorrect-word">${word}</span>`;
            }).join(' ');
        }

        btnPrev.addEventListener('click', () => {
            if (currentIndex > 0) { currentIndex--; updateSentence(); }
        });

        btnNext.addEventListener('click', () => {
            const list = getCurrentSentences();
            if (currentIndex < list.length - 1) { currentIndex++; updateSentence(); }
        });

        // CHẠY KHỞI TẠO LẦN ĐẦU
        initUnitSelector();
        updateSentence();
    </script>

</body>
